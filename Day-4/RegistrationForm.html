<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form - HTML5 Validation</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; }
        .form-container { 
            width: 500px; 
            margin: 20px auto; 
            background-color: #a5eeefff; 
            padding: 20px; 
            border: 2px solid #000;
            border-radius: 20px;
        }
        input{
            border-radius: 10px;
        }
        h2 { text-align: center; color: #333; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 8px; border: 1px solid #2e7d32; }
        input[type="text"], input[type="email"], input[type="password"], 
        input[type="tel"], input[type="date"], input[type="number"], 
        select, textarea {
            width: 95%;
            padding: 5px;
        }
        .buttons { text-align: center; padding-top: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Registration Form</h2>
    <form action="#">
        <table>
            <tr>
                <td>First Name :</td>
                <td><input type="text" placeholder="Enter First Name" required></td>
            </tr>
            <tr>
                <td>Last Name :</td>
                <td><input type="text" placeholder="Enter Last Name" required></td>
            </tr>
            <tr>
                <td>Contact no. :</td>
                <td><input type="tel" pattern="[0-9]{10}" placeholder="10 Digit Mobile No" required></td>
            </tr>
            <tr>
                <td>Landline no : (079-123456)</td>
                <td><input type="tel" pattern="[0-9]{3}-[0-9]{6,8}" placeholder="Enter Your Landline No."></td>
            </tr>
            <tr>
                <td>Email :</td>
                <td><input type="email" placeholder="Enter Your Email ID" required></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" placeholder="Enter a New Password" required></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
                <td><input type="date" required></td>
            </tr>
            <tr>
                <td>Age</td>
                <td><input type="number" min="1" max="100" placeholder="Enter Age"></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender" value="male" id="m"> <label for="m">Male</label>
                    <input type="radio" name="gender" value="female" id="f"> <label for="f">Female</label>
                </td>
            </tr>
            <tr>
                <td>Address</td>
                <td><textarea rows="3"></textarea></td>
            </tr>
            <tr>
                <td>City</td>
                <td>
                    <select>
                        <option value="">Select City</option>
                        <option value="ahmedabad">Ahmedabad</option>
                        <option value="surat">Surat</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Pincode</td>
                <td><input type="text" pattern="[0-9]{6}" placeholder="6 Digit Code"></td>
            </tr>
            <tr>
                <td>Joining Date</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td>Confirm Your Form</td>
                <td class="buttons">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>
</div>

</body>
</html>
