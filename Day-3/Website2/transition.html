<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .photo{
            width: 200px;
            height: 200px;
            border-radius: 50%;
            transition: transform 5s ease;
        }

        .photo:hover{
            transform: scale(1.5);
            translate: 500px;
        }
    </style>

</head>
<body>
    <img class="photo" src="images/logo.jpg" alt="Logo">
</body>
</html>
