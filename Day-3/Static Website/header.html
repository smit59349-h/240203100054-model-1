<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Header</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
        }

        .header{
            background:#fff;
            padding:20px 5%;
            border-bottom:1px solid #eee;
        }

        .container{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo a{
            text-decoration:none;
            font-size:32px;
            font-weight:bold;
            color:#000;
        }

        .navbar ul{
            list-style:none;
            display:flex;
            gap:30px;
        }

        .navbar ul li a{
            text-decoration:none;
            color:#000;
            font-size:14px;
            position:relative;
        }

        .navbar ul li a.active::after{
            content:"";
            position:absolute;
            left:0;
            bottom:-6px;
            width:100%;
            height:2px;
            background:red;
        }

        .header-icons{
            display:flex;
            align-items:center;
            gap:18px;
        }

        .login{
            text-decoration:none;
            color:#666;
            font-size:14px;
        }

        .icon{
            position:relative;
            font-size:18px;
            cursor:pointer;
        }

        .icon span{
            position:absolute;
            top:-8px;
            right:-10px;
            background:#000;
            color:#fff;
            width:16px;
            height:16px;
            border-radius:50%;
            font-size:10px;
            display:flex;
            justify-content:center;
            align-items:center;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
            <img src="images/logo.png" width="80px" height="80px">
            </div>

            <nav class="navbar">
            <ul>
                <li><a href="#" class="active">HOME</a></li>
                <li><a href="#">WOMEN’S</a></li>
                <li><a href="#">MEN’S</a></li>
                <li><a href="#">SHOP</a></li>
                <li><a href="#">PAGES</a></li>
                <li><a href="#">BLOG</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>
            </nav>

            <div class="header-icons">
            <a href="#" class="login">Login / Register</a>

            <div class="icon">
                🔍
            </div>

            <div class="icon cart">
                ❤
                <span>2</span>
            </div>

            <div class="icon cart">
                🛒
                <span>2</span>
            </div>
            </div>
        </div>
    </header>
<!-- Header End -->
</body>
</html>
