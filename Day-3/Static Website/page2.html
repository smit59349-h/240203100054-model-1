<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion Shop - Page 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <aside class="sidebar">
    <div class="section">
      <h2>NEW ARRIVALS</h2>
      <p class="side-text">Discover the latest fashion products.</p>
    </div>
  </aside>

  <main class="products-area">

    <div class="products-grid">

      <div class="product-card">
        <img src="images/girl1.jpg" alt="jacket">
        <h3>Classic Brown Jacket</h3>
        <div class="stars">★★★★★</div>
        <p>$ 69.0</p>
      </div>

      <div class="product-card">
        <img src="images/girl2.jpg" alt="dress">
        <h3>Elegant Summer Dress</h3>
        <div class="stars">★★★★★</div>
        <p>$ 79.0</p>
      </div>

      <div class="product-card">
        <img src="images/girl3.jpg" alt="heels">
        <h3>Modern High Heels</h3>
        <div class="stars">★★★★★</div>
        <p>$ 89.0</p>
      </div>

      <div class="product-card">
        <img src="images/girl4.jpg" alt="shirt">
        <h3>Oversized T-shirt</h3>
        <div class="stars">★★★★★</div>
        <p>$ 35.0</p>
      </div>

      <div class="product-card">
        <img src="images/girl1.jpg" alt="fashion">
        <h3>Premium Fashion Wear</h3>
        <div class="stars">★★★★★</div>
        <p>$ 120.0</p>
      </div>

      <div class="product-card">
        <img src="images/girl2.jpg" alt="shopping bag">
        <h3>Luxury Shopping Bag</h3>
        <div class="stars">★★★★★</div>
        <p>$ 45.0</p>
      </div>

    </div>

    <div class="pagination">
      <a href="products.html">1</a>
      <a class="active" href="page2.html">2</a>
    </div>

  </main>

</div>

</body>
</html>
