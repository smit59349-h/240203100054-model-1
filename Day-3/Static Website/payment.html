<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.html">
    <link rel="stylesheet" href="footer.html">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Payment</title>
</head>
<body>
<div id="header1"></div>
<section class="cart-section">

  <table>

    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th></th>
      </tr>
    </thead>

    <tbody>
      <tr id="row1">

        <td>
          <div class="product">
            <img src="images/man3.jpg" alt="">
            
            <div class="product-info">
              <h3>Men 1</h3>
              
            </div>
          </div>
        </td>

        <td class="price">$150.0</td>

        <td>
          <div class="quantity-box">
            <span class="quantity-btn" onclick="min_item()">-</span>
            <span id="pro1">1</span>
            <span class="quantity-btn" onclick="add_item()">+</span>
          </div>
        </td>

        <td class="total" id="total-am1">$150.0</td>

        <td>
          <button class="remove-btn" id="remove-btn1" onclick="remove_item()">×</button>
        </td>

      </tr>

      

    </tbody>

  </table>

  <div class="cart-actions">
    <button class="btn"><a href="products.html">CONTINUE SHOPPING</a></button>
    <button class="btn"><a href="cart.html">UPDATE CART</a></button>
  </div>

  <div class="bottom-wrapper">

    <div class="discount">

      <h2>DISCOUNT CODES</h2>

      <div class="coupon-box">
        <input type="text" placeholder="Enter your coupon code">
        <button class="btn-cou">APPLY</button>
      </div>

    </div>

    <div class="cart-total">

      <h2>CART TOTAL</h2>

      <div class="cart-total-row">
        <span>Total</span>
        <p id="totalMan2">$150.0</p>
      </div>

      <button class="checkout-btn">
        <a href="paymentDetails.html">PROCEED TO CHECKOUT</a>
      </button>

    </div>

  </div>

</section>
<div id="footer1"></div>
<script src="script.js"></script>
</body>
</html>
