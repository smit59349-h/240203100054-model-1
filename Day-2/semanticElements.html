<!DOCTYPE html>
<html>
<head>
    <title>Semantic Elements</title>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <main>
        <section>
            <h2>Section Title</h2>
            <article>
                <h3>Article Title</h3>
                <p>Article inside a section.</p>
            </article>
        </section>

        <aside>
            <h3>h3 inside Aside tag</h3>
            <p>This is aside content.</p>
        </aside>

        <figure>
            <img src="https://www.istockphoto.com/photos/flowers-jpg" alt="Sample Image">
            <figcaption>This is an image caption.</figcaption>
        </figure>

        <details>
            <summary>Summary of Website</summary>
            <p>This text is shown when details .</p>
        </details>

        <p>This is <mark>highlighted text</mark>.</p>

        <p>Today's date: <time datetime="2026-05-12">12 May 2026</time></p>

    </main>

    <footer>
        <p>&copy; 2026 My Website</p>
    </footer>

</body>
</html>
