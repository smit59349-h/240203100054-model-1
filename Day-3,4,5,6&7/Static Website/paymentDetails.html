<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.html">
    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Home</title>
</head>
<body>
    <div id="header1"></div>
    <div class="container-pay">
		<div class="left">
			<h3>BILLING ADDRESS</h3>
			<form>
				Full name
				<input type="text" name="" placeholder="Enter name" required >
				Email
				<input type="text" name="" placeholder="Enter email" required>

				Address
				<input type="text" name="" placeholder="Enter address" required>
				
			</form>
		</div>
		<div class="right">
			<h3>PAYMENT</h3>
			<form>
				Credit card number
				<input type="text" name="" placeholder="Enter card number" required>	
				Exp month
				<input type="text" name="" placeholder="Enter Month">
				<div id="zip">
					<label>
						Exp year
						<input type="month" placeholder="MM" required >
					</label>
						<label>
						CVV
						<input type="number" name="" placeholder="CVV">
					</label>
				</div>
			</form>
			<button class="pay"><a href="confirm.html">Proceed To CheckOut</a></button>
		</div>
	</div>
    <div id="footer1"></div>
    <script src="script.js"></script>
</body>
</html>
