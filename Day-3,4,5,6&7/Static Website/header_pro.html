<header class="headerp">
    <div class="containerp">
        <div class="logo">
            <img src="images/logo.png" width="100px" height="35px">
        </div>

        <nav class="navbarp">
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="women.html">WOMEN’S</a></li>

                <li>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products...">

                    <i class="fa-solid fa-magnifying-glass" style="color: white;"></i>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products...">
                <button onclick="searchProducts()">
                    <i class="fa-solid fa-magnifying-glass" style="color: white;"></i>
                </button>

            </div>

            <div class="sort-box">
                <select id="sortSelect" onchange="sortProducts()">
                    <option value="">Sort By</option>
                    <option value="az">Name A-Z</option>
                    <option value="za">Name Z-A</option>
                </select>
            </div>

<script>


function searchProducts() {

    let input = document.getElementById("searchInput").value.toLowerCase();

    let products = document.querySelectorAll(".product-card");

    products.forEach(function(product){

        let name = product.querySelector("h3").innerText.toLowerCase();

        if(name.includes(input)){
            product.style.display = "block";
        }
        else{
            product.style.display = "none";
        }

    });
}


function sortProducts(){

    let grid = document.querySelector(".products-grid");

    let products = Array.from(document.querySelectorAll(".product-card"));

    let value = document.getElementById("sortSelect").value;

    products.sort(function(a,b){

        let nameA = a.querySelector("h3").innerText.toLowerCase();
        let nameB = b.querySelector("h3").innerText.toLowerCase();

        if(value === "az"){
            return nameA.localeCompare(nameB);
        }

        if(value === "za"){
            return nameB.localeCompare(nameA);
        }

    });

    products.forEach(function(product){
        grid.appendChild(product);
    });

}

</script>
