<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.html">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <title>Home</title>
</head>
<body>
    
    <div class="modal fade" id="popupModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title" style="margin-left: 140px;">Welcome to Ashion</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <img src="images/banner9.jpg" class="img-fluid rounded mb-3" alt="Popup Image">
                <p>Get 50% OFF on your first order!</p>
                <a href="products.html" class="btn btn-primary">Shop Now</a>
            </div>

        </div>
    </div>
</div>


    <div id="header1"></div>
    <div class="my_slider">
            <div class="my_slide">
                <img src="images/banner6.jpg">
            </div>
    </div>
    <div class="product-container">
        <h1>Product</h1>

        <div class="product-box">
            

            <div class="product-image">
                <img src="images/man5.jpg" alt="Men Outfit">
            </div>
            <div class="product-info">
                <h2>Effortless Minimal Men's Outfits</h2>
                
                <p class="price">$49.0</p>
                
                <div class="sizes">
                    <button>M</button>
                    <button>L</button>
                    <button>XL</button>
                </div>
                <div class="btn-pro">
                    <button class="cart-btn"><a href="products.html">Shop Now</a></button>
                </div>
            </div>

        </div>
    </div>

    <div class="my_slider">
        <div class="my_slide">
            <img src="images/banner8.jpg">
        </div>
    </div>

    <div id="footer1"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        var myModal = new bootstrap.Modal(document.getElementById('popupModal'));
        myModal.show();
    });
    </script>
    <script src="script.js"></script>
</body>
</html>
